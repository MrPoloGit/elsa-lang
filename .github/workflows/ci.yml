name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check Rust extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check
